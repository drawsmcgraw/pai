events {}

http {
    server {
        listen 80;

        # Main chat UI and all orchestrator routes (/, /services, /message, /files, etc.)
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Required for SSE streaming — disable buffering so tokens arrive immediately
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }
    }
}
