<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronk</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #171b24;
    --bg3: #1e2330;
    --border: #2a3044;
    --text: #e8eaf0;
    --text2: #9ba3bc;
    --text3: #5c6480;
    --green: #1fa876;
    --blue: #3b82f6;
    --user-bubble: #1e2d4a;
    --kronk-bubble: #1a1f2e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0.85rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .kronk-name {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .status-dot.offline { background: var(--text3); }

  .clear-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .clear-btn:hover { color: var(--text2); border-color: var(--text3); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    gap: 4px;
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 0.65rem 0.95rem;
    border-radius: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2a3a5e;
    border-bottom-right-radius: 3px;
  }

  .message.assistant .bubble {
    background: var(--kronk-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }

  .label {
    font-size: 11px;
    color: var(--text3);
    padding: 0 4px;
  }

  .bubble pre {
    background: #0a0d14;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    overflow-x: auto;
    margin: 0.5rem 0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.6;
  }

  .bubble pre:first-child { margin-top: 0; }
  .bubble pre:last-child  { margin-bottom: 0; }

  .bubble code {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    background: #0a0d14;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }

  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: inherit;
  }

  .code-lang {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 0.4rem;
  }

  .stage-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text3);
    padding: 0 4px;
    height: 16px;
  }

  .stage-spinner {
    width: 10px;
    height: 10px;
    border: 1.5px solid var(--border);
    border-top-color: var(--text3);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .stage-label {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    letter-spacing: 0.02em;
  }

  .timing-toggle {
    font-size: 11px;
    color: var(--text3);
    padding: 0 4px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    text-align: left;
  }

  .timing-toggle:hover { color: var(--text2); }

  .timing-breakdown {
    display: none;
    flex-direction: column;
    gap: 2px;
    padding: 4px 4px 0;
  }

  .timing-breakdown.visible { display: flex; }

  .timing-row {
    display: flex;
    gap: 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    color: var(--text3);
    line-height: 1.6;
  }

  .timing-row .t-label { min-width: 100px; }
  .timing-row .t-value { color: var(--text2); }
  .timing-row .t-fail { color: #c0392b; }

  .bubble a { color: var(--blue); text-decoration: none; }
  .bubble a:hover { text-decoration: underline; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--text2);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 14px;
  }

  footer {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 0.85rem 1.25rem;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 0.6rem 0.9rem;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  #input:focus { border-color: var(--blue); }
  #input::placeholder { color: var(--text3); }

  .send-btn, .mic-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .send-btn:hover:not(:disabled) { background: var(--blue); color: white; border-color: var(--blue); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .attach-btn {
    position: relative;
  }

  .attach-btn input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .file-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0.5rem 1.25rem 0;
    background: var(--bg2);
  }

  .file-chips:empty {
    display: none;
  }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .file-chip.warning {
    border-color: #7c5c1e;
    color: #d4a030;
  }

  .chip-remove {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
  }

  .chip-remove:hover { color: var(--text); }

  .token-warning {
    font-size: 11px;
    color: #d4a030;
    padding: 0.25rem 1.25rem 0;
    background: var(--bg2);
  }

  .token-warning:empty { display: none; }

  svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="status-dot" id="status-dot"></div>
    <span class="kronk-name">Kronk</span>
  </div>
  <button class="clear-btn" onclick="clearHistory()">clear history</button>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">Send a message to start talking to Kronk.</div>
</div>

<div class="file-chips" id="file-chips"></div>
<div class="token-warning" id="token-warning"></div>
<footer>
  <textarea id="input" placeholder="Message Kronk..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
  <button class="send-btn attach-btn" title="Attach file">
    <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    <input type="file" id="file-input" accept=".pdf,.txt,.md,.py,.js,.ts,.json,.yaml,.yml,.csv" multiple onchange="handleFileUpload(event)">
  </button>
</footer>

<script>
  let isStreaming = false;

  async function checkHealth() {
    try {
      const r = await fetch('/health');
      document.getElementById('status-dot').classList.toggle('offline', !r.ok);
    } catch {
      document.getElementById('status-dot').classList.add('offline');
    }
  }

  checkHealth();
  setInterval(checkHealth, 15000);

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderMarkdown(text) {
    // Fenced code blocks: ```lang\ncode\n```
    let html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const langLabel = lang ? `<span class="code-lang">${escapeHtml(lang)}</span>` : '';
      return `<pre>${langLabel}<code>${escapeHtml(code.replace(/\n$/, ''))}</code></pre>`;
    });
    // Inline code: `foo`
    html = html.replace(/`([^`\n]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`);
    // Markdown links: [text](url) — processed after code to avoid matching inside code blocks
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, linkText, url) =>
      `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(linkText)}</a>`
    );
    // Paragraphs: split on double newlines, wrap non-pre blocks in <p>
    html = html.split(/\n{2,}/).map(block => {
      if (block.startsWith('<pre')) return block;
      const inner = block.replace(/\n/g, '<br>');
      return `<p>${inner}</p>`;
    }).join('');
    return html;
  }

  const stageLabels = {
    waiting:          'waiting for Kronk...',
    generating:       'generating...',
    routing:          'routing...',
    fetching_weather: 'fetching weather...',
    fetching_search:  'searching the web...',
    fetching_url:     'reading page...',
    fetching:         'updating list...',
    speaking:         'speaking...',
  };

  function addMessage(role, text) {
    document.getElementById('empty-state')?.remove();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <span class="label">${role === 'user' ? 'you' : 'kronk'}</span>
      <div class="bubble"></div>
    `;
    div.querySelector('.bubble').textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function setStage(messageDiv, stage) {
    let indicator = messageDiv.querySelector('.stage-indicator');
    if (!stage) {
      indicator?.remove();
      return;
    }
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.className = 'stage-indicator';
      const label = messageDiv.querySelector('.label');
      label.insertAdjacentElement('afterend', indicator);
    }
    indicator.innerHTML = `
      <div class="stage-spinner"></div>
      <span class="stage-label">${stageLabels[stage] ?? stage}</span>
    `;
  }

  async function sendMessage() {
    if (isStreaming) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    isStreaming = true;

    addMessage('user', text);
    const messageDiv = addMessage('assistant', '');
    const bubble = messageDiv.querySelector('.bubble');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    let fullText = '';
    let timingData = null;

    try {
      const resp = await fetch('/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let done = false;

      while (!done) {
        const { done: streamDone, value } = await reader.read();
        if (streamDone) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const payload = line.slice(5).trim();
          if (payload === '[DONE]') { done = true; break; }
          try {
            const data = JSON.parse(payload);
            if (data.stage) {
              setStage(messageDiv, data.stage);
            }
            if (data.timing) {
              timingData = data.timing;
            }
            if (data.token) {
              setStage(messageDiv, null);
              fullText += data.token;
              cursor.remove();
              bubble.textContent = fullText;
              bubble.appendChild(cursor);
              document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
          } catch {}
        }
      }

      // Render markdown once streaming is complete
      if (fullText) {
        cursor.remove();
        bubble.innerHTML = renderMarkdown(fullText);
      }

      // Attach timing toggle if we have data
      if (timingData) {
        const toolLabels = { weather: 'weather', search: 'web search', url: 'page fetch', list: 'shopping list' };
        const rows = [];
        for (const stage of (timingData.stages || [])) {
          const label = toolLabels[stage.tool] || stage.tool;
          rows.push({ label, value: `${stage.s}s`, ok: stage.ok });
        }
        if (timingData.ttft_s != null)       rows.push({ label: 'first token', value: `${timingData.ttft_s}s`, ok: true });
        if (timingData.generation_s != null) rows.push({ label: 'generation',  value: `${timingData.generation_s}s`, ok: true });
        if (rows.length) {
          const toggle = document.createElement('button');
          toggle.className = 'timing-toggle';
          toggle.textContent = '· timing';
          const breakdown = document.createElement('div');
          breakdown.className = 'timing-breakdown';
          for (const { label, value, ok } of rows) {
            const row = document.createElement('div');
            row.className = 'timing-row';
            const valueClass = ok ? 't-value' : 't-fail';
            row.innerHTML = `<span class="t-label">${label}</span><span class="${valueClass}">${value}</span>`;
            breakdown.appendChild(row);
          }
          toggle.addEventListener('click', () => breakdown.classList.toggle('visible'));
          messageDiv.appendChild(toggle);
          messageDiv.appendChild(breakdown);
        }
      }
    } catch (e) {

      setStage(messageDiv, null);
      bubble.textContent = 'Error: could not reach Kronk.';
    } finally {
      setStage(messageDiv, null);
      cursor.remove();
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  async function clearHistory() {
    await fetch('/history', { method: 'DELETE' });
    const container = document.getElementById('messages');
    container.innerHTML = '<div class="empty-state" id="empty-state">Send a message to start talking to Kronk.</div>';
    document.getElementById('file-chips').innerHTML = '';
    document.getElementById('token-warning').textContent = '';
  }

  async function handleFileUpload(event) {
    const files = Array.from(event.target.files);
    event.target.value = '';
    for (const file of files) {
      const formData = new FormData();
      formData.append('file', file);
      try {
        const resp = await fetch('/files', { method: 'POST', body: formData });
        if (!resp.ok) {
          const err = await resp.json();
          alert(`Could not attach ${file.name}: ${err.detail}`);
          continue;
        }
        const result = await resp.json();
        renderFileChips(result.warning);
      } catch {
        alert(`Failed to upload ${file.name}`);
      }
    }
  }

  async function removeFile(filename) {
    await fetch(`/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    renderFileChips();
  }

  async function renderFileChips(warn) {
    const resp = await fetch('/files');
    const data = await resp.json();
    const chips = document.getElementById('file-chips');
    const warning = document.getElementById('token-warning');
    chips.innerHTML = '';
    for (const f of data.files) {
      const chip = document.createElement('div');
      chip.className = 'file-chip' + (data.warning ? ' warning' : '');
      chip.innerHTML = `
        <span>${escapeHtml(f.name)}</span>
        <span style="color:var(--text3)">~${f.tokens} tok</span>
        <button class="chip-remove" onclick="removeFile('${escapeHtml(f.name)}')" title="Remove">×</button>
      `;
      chips.appendChild(chip);
    }
    warning.textContent = data.warning
      ? `⚠ ~${data.total_tokens} tokens in attached files — context window may fill up`
      : '';
  }
</script>
</body>
</html>
