use_default_settings: true

general:
  debug: false
  instance_name: "Kronk Search"

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "kronk-searxng-secret"
  bind_address: "127.0.0.1"
  port: 8080
  public_instance: false

engines:
  - name: google
    engine: google
    categories: general
    disabled: false

  - name: bing
    engine: bing
    categories: general
    disabled: false

  - name: wikipedia
    engine: wikipedia
    categories: general
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    categories: general
    disabled: false

# Disable everything else
  - name: google images
    engine: google_images
    disabled: true

  - name: google news
    engine: google_news
    disabled: true

  - name: bing images
    engine: bing_images
    disabled: true

  - name: bing news
    engine: bing_news
    disabled: true

  - name: reddit
    engine: reddit
    disabled: true

  - name: twitter
    engine: twitter
    disabled: true

categories_as_tabs:
  general: {}
